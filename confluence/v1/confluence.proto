syntax = "proto3";

package jax.v1;

option go_package = "github.com/ekinolik/jax/api/proto/confluence/v1;confluencev1";

// ConfluenceService exposes real-time multi-signal confluence scores for day trading.
service ConfluenceService {
  // GetConfluence returns the latest snapshot for a ticker, activating the ticker if needed.
  rpc GetConfluence(GetConfluenceRequest) returns (ConfluenceSnapshot);

  // GetConfluenceSummary returns a human-readable summary projected from the latest snapshot.
  rpc GetConfluenceSummary(GetConfluenceRequest) returns (ConfluenceSummary);

  // WatchConfluence streams snapshot updates when score or signal status changes.
  rpc WatchConfluence(WatchConfluenceRequest) returns (stream ConfluenceSnapshot);
}

message GetConfluenceRequest {
  string ticker = 1;
}

message WatchConfluenceRequest {
  string ticker = 1;
}

message ConfluenceSnapshot {
  string ticker = 1;
  int64 timestamp = 2;
  double confluence_score = 3;
  string readiness = 4;
  string oi_status = 5;
  string market_status = 6;
  repeated ConfluenceSignal signals = 7;
  ConfluenceLevels levels = 8;
  double daily_range_position = 9;
  string distance_to_entry = 10;
  int32 haptic_level = 11;
  int32 background_level = 12;
  double spot = 13;
  int64 spot_timestamp = 14;
  double rsi = 15;
  string sector_etf = 16;
  bool stacked_zone = 17;
  // Unix seconds for the latest spot/greeks/OI input used in this snapshot (may be stale when market is closed).
  int64 data_as_of = 18;

  // v2 buy signals (preferred); signals field kept for backward compat
  repeated ConfluenceSignal buy_signals = 19;
  repeated ConfluenceSignal sell_signals = 20;

  // Sell path (long exits only)
  double sell_score = 21;
  string sell_readiness = 22;
  string exit_action = 23;
  string distance_to_exit = 24;

  // RSI daily + ADR
  double rsi_daily = 25;
  double adr_pct = 26;
  double adr_30d_pct = 27;
  double adr_5d_pct = 28;
  double adr_spike_ratio = 29;
  string adr_regime = 30;

  // Trade geometry
  double upside_pct = 31;
  double downside_pct = 32;
  double risk_reward = 33;
  double upside_beyond_resistance_pct = 34;

  // Gamma regime + squeeze
  string gamma_regime = 35;
  string gamma_regime_strength = 36;
  double net_gex_at_spot = 37;
  double call_wall = 38;
  double put_wall = 39;
  double session_vwap = 40;
  double relative_volume = 41;
  bool gamma_squeeze_active = 42;
  bool short_squeeze_active = 43;
  double gamma_environment_score = 44;
  double gamma_directional_score = 45;
  double short_squeeze_score = 46;
  double short_pressure_score = 47;
  double squeeze_trigger_score = 48;
  double short_interest_pct = 49;
  double short_volume_ratio = 50;
  double days_to_cover = 51;
  double float_shares = 52;

  // Static entry playbook when buy readiness warrants (v2.1)
  TradePlan trade_plan = 53;
}

message ConfluenceSignal {
  string name = 1;
  double weight = 2;
  double axis_fill = 3;
  string status = 4;
  string icon = 5;
  double score = 6;
  string detail = 7;
}

message ConfluenceLevel {
  double price = 1;
  string source = 2;
  double strength = 3;
  int32 rank = 4;
  string expiration = 5;
}

message ConfluenceLevels {
  double gamma_flip = 1;
  repeated ConfluenceLevel support = 2;
  repeated ConfluenceLevel resistance = 3;
  double nearest_support = 4;
  double nearest_resistance = 5;
  bool has_nearest_support = 6;
  bool has_nearest_resistance = 7;
}

// ConfluenceSummary is a human-readable projection of ConfluenceSnapshot.
message ConfluenceSummary {
  string ticker = 1;
  double spot = 2;
  string as_of = 3;
  string market = 4;

  ConfluenceSummaryVerdict verdict = 5;
  ConfluenceSummaryTradeSetup trade_setup = 6;
  ConfluenceSummaryContext context = 7;
  ConfluenceSummaryLevels levels = 8;
  repeated string reasons = 9;
  repeated string warnings = 10;
  ConfluenceSummaryGates gates = 11;
  TradePlan trade_plan = 12;
}

message TradePlan {
  EntryZone entry_zone = 1;
  repeated StopLevel stops = 2;
  repeated AddLevel average_down = 3;
  double exit_instead_of_add_below = 4;
  SpotContext spot_context = 5;
  repeated string intraday_notes = 6;
  double gex_dex_gap_pct = 7;
  double trade_invalidation_price = 8;
  double structure_invalidation_price = 9;
  double primary_exit_price = 10;
  PlanInvalidation invalidation = 11;
  PlanPrimaryExit primary_exit = 12;
}

message EntryZone {
  double price = 1;
  string source = 2;
  string timing = 3;
  double distance_from_spot_pct = 4;
  string note = 5;
}

message StopLevel {
  string tier = 1;
  double price = 2;
  string source = 3;
  string rule = 4;
  string action = 5;
  string label = 6;
  string meaning = 7;
}

message PlanInvalidation {
  InvalidationPoint trade = 1;
  InvalidationPoint structure = 2;
}

message InvalidationPoint {
  double price = 1;
  string label = 2;
  string meaning = 3;
}

message PlanPrimaryExit {
  double price = 1;
  string label = 2;
  bool emphasis = 3;
}

message AddLevel {
  string tier = 1;
  double price = 2;
  string size_hint = 3;
  string condition = 4;
  string if_below = 5;
}

message SpotContext {
  string vs_entry_zone = 1;
  string vs_soft_stop = 2;
  string vs_hard_stop = 3;
  string guidance = 4;
}

message ConfluenceSummaryVerdict {
  ConfluenceSummaryBuyVerdict buy = 1;
  ConfluenceSummarySellVerdict sell = 2;
}

message ConfluenceSummaryBuyVerdict {
  int32 score = 1;
  string readiness = 2;
  string label = 3;
}

message ConfluenceSummarySellVerdict {
  int32 score = 1;
  string readiness = 2;
  string action = 3;
  string label = 4;
}

message ConfluenceSummaryTradeSetup {
  string archetype = 1;
  string entry_timing = 2;
  string exit_timing = 3;
  double upside_pct = 4;
  double downside_pct = 5;
  double risk_reward = 6;
}

message ConfluenceSummaryContext {
  string adr_regime = 1;
  string gamma_regime = 2;
  bool gamma_squeeze = 3;
  bool short_squeeze = 4;
  bool rsi_minute_unavailable = 5;
  double rsi_minute = 6;
  double rsi_daily = 7;
}

message ConfluenceSummaryLevels {
  double support = 1;
  double resistance = 2;
  double call_wall = 3;
  double put_wall = 4;
}

message ConfluenceSummaryGates {
  bool upside_ok = 1;
  bool adr_ok = 2;
  bool blocked_from_high_conviction = 3;
}
